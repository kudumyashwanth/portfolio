<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1200px; height:630px; overflow:hidden; }
  body{
    font-family:"Space Grotesk", sans-serif; color:#c0caf5;
    background:radial-gradient(120% 130% at 72% 25%, #18213f 0%, #0b0d16 52%, #06070d 100%);
    position:relative;
  }
  .mono{ font-family:"JetBrains Mono", monospace; }
  .pad{ position:absolute; inset:54px; }
  .brackets span{ position:absolute; width:26px; height:26px; border:2px solid #7aa2f7; opacity:.6; }
  .bl-tl{ top:0; left:0; border-right:0; border-bottom:0; }
  .bl-tr{ top:0; right:0; border-left:0; border-bottom:0; }
  .bl-bl{ bottom:0; left:0; border-right:0; border-top:0; }
  .bl-br{ bottom:0; right:0; border-left:0; border-top:0; }

  .label{ position:absolute; top:80px; left:80px; font-size:20px; letter-spacing:9px; color:#565f89; }
  .name{ position:absolute; left:74px; top:150px; }
  .name h1{ font-size:128px; font-weight:700; line-height:.9; letter-spacing:-3px; }
  .name h1 .a{ background:linear-gradient(120deg,#7aa2f7,#bb9af7); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .name h1 .b{ -webkit-text-stroke:1.5px #c0caf5; color:transparent; }
  .roles{ position:absolute; left:80px; top:430px; font-size:24px; letter-spacing:4px; color:#7dcfff; }
  .url{ position:absolute; left:80px; bottom:92px; font-size:22px; color:#c0caf5; }
  .tags{ position:absolute; right:80px; bottom:94px; font-size:18px; color:#565f89; letter-spacing:2px; }

  /* circuit / chip motif top-right */
  svg.circuit{ position:absolute; top:0; right:0; width:520px; height:430px; opacity:.55; }
  .chip{ position:absolute; top:120px; right:120px; }
</style>
</head>
<body>
  <svg class="circuit" viewBox="0 0 520 430" fill="none">
    <g stroke="#7aa2f7" stroke-width="1.4" opacity="0.5">
      <path d="M520 60 H300 V180 M520 150 H360 V300 H520 M420 0 V120 H520 M520 240 H400 V430"/>
    </g>
    <g fill="#7dcfff"><circle cx="300" cy="60" r="5"/><circle cx="360" cy="300" r="5"/></g>
    <g fill="#bb9af7"><circle cx="420" cy="120" r="5"/><circle cx="400" cy="240" r="5"/></g>
    <!-- chip die -->
    <g transform="translate(330,150)">
      <rect x="0" y="0" width="150" height="150" rx="6" fill="#0e1626" stroke="#7aa2f7" stroke-width="2"/>
      <rect x="22" y="22" width="48" height="48" fill="#7aa2f7" opacity="0.5"/>
      <g fill="#bb9af7" opacity="0.7">
        <rect x="82" y="22" width="20" height="20"/><rect x="108" y="22" width="20" height="20"/>
        <rect x="82" y="48" width="20" height="20"/><rect x="108" y="48" width="20" height="20"/>
      </g>
      <rect x="22" y="86" width="106" height="42" fill="#7dcfff" opacity="0.3"/>
      <g stroke="#c9a86a" stroke-width="3">
        <path d="M16 0 V-14 M44 0 V-14 M72 0 V-14 M100 0 V-14 M128 0 V-14"/>
        <path d="M16 150 V164 M44 150 V164 M72 150 V164 M100 150 V164 M128 150 V164"/>
      </g>
    </g>
  </svg>

  <div class="pad"><div class="brackets">
    <span class="bl-tl"></span><span class="bl-tr"></span><span class="bl-bl"></span><span class="bl-br"></span>
  </div></div>

  <div class="label mono">SILICON ARCHITECT</div>
  <div class="name">
    <h1><span class="a">KUDUM</span></h1>
    <h1><span class="b">YASHWANTH</span></h1>
  </div>
  <div class="roles mono">VLSI · RISC-V SoC · RTL→GDSII · EMBEDDED AI</div>
  <div class="url mono">kudumyashwanth.github.io/portfolio</div>
  <div class="tags mono">WNS/TNS = 0 · CLEAN DRC · LVS ✓</div>
</body>
</html>
